<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Tan – Career Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    color: white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }

  /* ── ANIMATED AVATAR ── */
  .avatar-wrap {
    position: relative;
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }
  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.35);
    animation: idlePulse 3s ease-in-out infinite;
  }
  .avatar-ring-2 {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    animation: idlePulse 3s ease-in-out infinite 1s;
  }
  @keyframes idlePulse {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.04); }
  }
  .avatar-ring.speaking {
    border-color: #4ade80;
    animation: speakPulse 0.5s ease-in-out infinite;
  }
  .avatar-ring-2.speaking {
    border-color: rgba(74,222,128,0.4);
    animation: speakPulse 0.5s ease-in-out infinite 0.15s;
  }
  @keyframes speakPulse {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  .avatar-photo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 2px solid rgba(255,255,255,0.5);
    display: block;
  }

  /* ── WAVEFORM ── */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 18px;
    margin-top: 4px;
  }
  .waveform span {
    display: inline-block;
    width: 3px;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
    height: 4px;
    transition: height 0.1s;
  }
  .waveform.speaking span:nth-child(1) { animation: bar 0.8s ease-in-out infinite 0.0s; }
  .waveform.speaking span:nth-child(2) { animation: bar 0.8s ease-in-out infinite 0.1s; }
  .waveform.speaking span:nth-child(3) { animation: bar 0.8s ease-in-out infinite 0.2s; }
  .waveform.speaking span:nth-child(4) { animation: bar 0.8s ease-in-out infinite 0.3s; }
  .waveform.speaking span:nth-child(5) { animation: bar 0.8s ease-in-out infinite 0.15s; }
  .waveform.speaking span:nth-child(6) { animation: bar 0.8s ease-in-out infinite 0.05s; }
  .waveform.speaking span:nth-child(7) { animation: bar 0.8s ease-in-out infinite 0.25s; }
  @keyframes bar {
    0%,100% { height: 4px;  opacity: 0.5; }
    50%      { height: 16px; opacity: 1; }
  }

  .header-info h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  .header-info .subtitle { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .header-right {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .mute-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .mute-btn:hover { background: rgba(255,255,255,0.25); }
  .mute-btn.muted { opacity: 0.55; }
  .speaking-label {
    font-size: 11px;
    color: #4ade80;
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.3px;
  }
  .speaking-label.visible { opacity: 1; }

  /* ── CHAT ── */
  .chat-container {
    width: 100%; max-width: 760px;
    display: flex; flex-direction: column;
    height: calc(100vh - 86px);
  }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 1.2rem 1rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .msg { display: flex; gap: 10px; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
    overflow: hidden;
  }
  .msg.bot .msg-avatar { background: #1a3a5c; }
  .msg.bot .msg-avatar img { width: 34px; height: 34px; object-fit: cover; object-position: center top; }
  .msg.user .msg-avatar { background: #e2e8f0; color: #4a5568; }
  .bubble {
    padding: 0.75rem 1rem;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.6;
  }
  .msg.bot .bubble {
    background: white;
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    color: #1a202c;
  }
  .msg.user .bubble {
    background: #2563a8; color: white;
    border-radius: 16px 4px 16px 16px;
  }
  .bubble .star-label {
    display: inline-block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    background: #ebf4ff; color: #1a56a4;
    border-radius: 4px; padding: 2px 7px; margin-bottom: 6px;
  }
  .bubble p { margin-bottom: 0.5rem; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 600; }

  /* ── CHIPS ── */
  .faq-chips { padding: 0.75rem 1rem 0; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: white; border: 1.5px solid #cbd5e0;
    border-radius: 20px; padding: 6px 14px;
    font-size: 13px; color: #2d3748; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .chip:hover { background: #ebf4ff; border-color: #2563a8; color: #2563a8; }

  /* ── INPUT ── */
  .input-area {
    padding: 0.75rem 1rem 1rem; background: white;
    border-top: 1px solid #e2e8f0;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; border: 1.5px solid #e2e8f0; border-radius: 12px;
    padding: 10px 14px; font-size: 14px; font-family: inherit;
    resize: none; outline: none; max-height: 100px; line-height: 1.5; color: #1a202c;
  }
  .input-area textarea:focus { border-color: #2563a8; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #2563a8; border: none; color: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .send-btn:hover { background: #1a4a8a; }
  .send-btn svg { width: 18px; height: 18px; }

  /* ── TYPING ── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing span {
    width: 7px; height: 7px; background: #94a3b8;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%          { transform: translateY(-6px); }
  }
  .contact-card {
    background: #f0f7ff; border: 1px solid #bee3f8;
    border-radius: 10px; padding: 12px 14px; margin-top: 8px; font-size: 13px;
  }
  .contact-card a { color: #2563a8; text-decoration: none; font-weight: 500; }
  .contact-card a:hover { text-decoration: underline; }
</style>
</head>

const EL_MODEL    = 'eleven_turbo_v2_5';      // fastest + cheapest on free tier

let currentAudio = null;

async function speak(htmlText) {
  if (isMuted) return;
  // Stop any currently playing audio
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  const text = stripHtml(htmlText).slice(0, 2500); // safety cap
  if (!text.trim()) return;

  setSpeaking(true);
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE_ID}/stream`, {
      method: 'POST',
      headers: {
        'xi-api-key': EL_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text,
        model_id: EL_MODEL,
        voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.2, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error(`EL error ${res.status}`);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { setSpeaking(false); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { setSpeaking(false); };
    currentAudio.play();
  } catch(err) {
    console.warn('ElevenLabs TTS failed:', err);
    setSpeaking(false);
  }
}

function toggleMute() {

    setSpeaking(false);

    btn.classList.add('muted');

  }
}

function addMessage(role, htmlContent) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarHtml = role === 'bot'
    ? `<div class="msg-avatar">${MINI_AVATAR}</div>`
    : `<div class="msg-avatar">You</div>`;
  div.innerHTML = `${avatarHtml}<div class="bubble">${htmlContent}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (role === 'bot') speak(htmlContent);
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function askFAQ(key) {
  const item = FAQ[key];
  addMessage('user', item.userText);
  showTyping();
  await new Promise(r => setTimeout(r, 600));
  removeTyping();
  addMessage('bot', item.answer);
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  showTyping();
  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', formatClaudeReply(reply));
  } catch(e) {
    removeTyping();
    addMessage('bot', `I'm having trouble connecting right now. Please reach out to William directly:<div class="contact-card">📬 <a href="mailto:tan.william.18@gmail.com">tan.william.18@gmail.com</a> | <a href="tel:+6596587625">+65 9658 7625</a></div>`);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

window.addEventListener('load', () => {
  addMessage('bot', `<p>👋 Hi! I'm William's career assistant, here to help HR professionals and hiring managers learn more about his background.</p><p>Tap a quick question below, or type your own. I'll answer using real examples from William's 15-year banking career — and if I don't have the answer, I'll connect you to him directly.</p>`);
});
